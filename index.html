<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/react.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Metadata -->
    <title>PrepSumit | Online Courses for College Credit, Exam Prep & Test Preparation</title>
    <meta name="description" content="PrepSumit is a leading online learning platform offering visual micro-lessons, practice quizzes, and custom study guides for exam prep, college credit, and teacher certification. Access 88,000+ courses and study on your schedule, risk-free." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://prepsumit.com/" />
    <meta property="og:title" content="PrepSumit | Online Courses for College Credit, Exam Prep & Test Preparation" />
    <meta property="og:description" content="PrepSumit is a leading online learning platform offering visual micro-lessons, practice quizzes, and custom study guides for exam prep, college credit, and teacher certification." />
    <meta property="og:image" content="https://prepsumit.com/og-image.png" />

    <!-- Twitter Card -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://prepsumit.com/" />
    <meta property="twitter:title" content="PrepSumit | Online Courses for College Credit, Exam Prep & Test Preparation" />
    <meta property="twitter:description" content="PrepSumit is a leading online learning platform offering visual micro-lessons, practice quizzes, and custom study guides for exam prep, college credit, and teacher certification." />
    <meta property="twitter:image" content="https://prepsumit.com/og-image.png" />

    <!-- Google Knowledge Graph Panel (Organization Schema) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "PrepSumit",
      "url": "https://prepsumit.com",
      "logo": "https://prepsumit.com/logo.png",
      "foundingDate": "2026",
      "description": "Online learning platform provides video lessons, practice questions, and custom study guides for exam preparation and mastering concepts. It offers college courses, K-12 educator resources, and professional development. AI tools personalize learning paths and assist with lesson planning.",
      "sameAs": [
        "https://www.facebook.com/prepsumit",
        "https://twitter.com/prepsumit",
        "https://www.youtube.com/@prepsumit"
      ]
    }
    </script>

    <!-- Sitelinks Searchbox Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "PrepSumit",
      "url": "https://prepsumit.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://prepsumit.com/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Site Navigation Elements Schema for Google Sitelinks -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@context": "https://schema.org",
          "@type": "SiteNavigationElement",
          "@id": "https://prepsumit.com/#navigation",
          "name": [
            "FTCE Exams Prep & Study Guides",
            "TEAS Nursing Test Prep",
            "Course Catalog",
            "Plans & Pricing",
            "Log in to your account",
            "Careers at PrepSumit"
          ],
          "url": [
            "https://prepsumit.com/ftce",
            "https://prepsumit.com/teas",
            "https://prepsumit.com/catalog",
            "https://prepsumit.com/signup",
            "https://prepsumit.com/login",
            "https://prepsumit.com/careers"
          ]
        }
      ]
    }
    </script>

    <!-- Course List Directory Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "item": {
            "@type": "Course",
            "name": "FTCE Professional Education Test (PEd) Study Guide and Test Prep",
            "description": "Prepare for the FTCE Professional Education Test with PrepSumit's comprehensive study guide featuring video lessons and practice tests.",
            "provider": {
              "@type": "Organization",
              "name": "PrepSumit",
              "sameAs": "https://prepsumit.com"
            }
          }
        },
        {
          "@type": "ListItem",
          "position": 2,
          "item": {
            "@type": "Course",
            "name": "TEAS Test Prep | Test of Essential Academic Skills Exam",
            "description": "Master the Math, Science, English, and Reading sections of the TEAS exam with PrepSumit's expert preparation materials.",
            "provider": {
              "@type": "Organization",
              "name": "PrepSumit",
              "sameAs": "https://prepsumit.com"
            }
          }
        },
        {
          "@type": "ListItem",
          "position": 3,
          "item": {
            "@type": "Course",
            "name": "AP Calculus AB Study Guide & Exam Preparation",
            "description": "Learn limits, derivatives, integrals, and their word problem applications with step-by-step video lessons and practice quizzes.",
            "provider": {
              "@type": "Organization",
              "name": "PrepSumit",
              "sameAs": "https://prepsumit.com"
            }
          }
        }
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
